sources:
  google-news:
    displayName: Google Financial News (Reuters links)
    type: rss
    urls:
      - https://news.google.com/rss/search?q=site:reuters.com%20markets
    filters:
      keywords:
        - market
        - earnings
  bloomberg:
    displayName: Bloomberg
    type: rss
    concurrency: 2
    urls:
      - https://www.bloomberg.com/feeds/bbiz/sitemap_news.xml
    headers:
      userAgent: Mozilla/5.0
    filters:
      keywords:
        - market
        - economy
        - rates
        - stocks
    options:
      maxItemsPerFeed: 20
  nytimes:
    displayName: New York Times
    type: rss
    concurrency: 2
    urls:
      - https://rss.nytimes.com/services/xml/rss/nyt/Business.xml
      - https://rss.nytimes.com/services/xml/rss/nyt/Economy.xml
      - https://rss.nytimes.com/services/xml/rss/nyt/Dealbook.xml
    filters:
      keywords:
        - market
        - merger
        - economy
        - inflation
    options:
      maxItemsPerFeed: 20
  seekingalpha:
    displayName: Seeking Alpha
    type: transcripts
    concurrency: 2
    urls:
      - https://seekingalpha.com/symbol/{ticker}.xml
    params:
      tickers:
        - AAPL
        - TSLA
    filters:
      keywords:
        - revenue
        - guidance
        - quarter
        - margin
    options:
      maxItemsPerFeed: 10
  cnbc:
    displayName: CNBC
    type: rss
    concurrency: 2
    urls:
      - https://www.cnbc.com/id/100727362/device/rss/rss.html
    filters:
      keywords:
        - market
        - stock
        - earnings
        - economy
    options:
      maxItemsPerFeed: 20
  reddit-stocks:
    displayName: Reddit Stocks
    type: reddit
    urls:
      - https://www.reddit.com/user/haymentt/m/financialmarket/hot.json?limit=35
    #   - https://www.reddit.com/r/{subreddit}/hot.json?limit=25
    # params:
    #   subreddits:
    #     - stocks
    #     - finance
    headers:
      userAgent: Mozilla/5.0
    filters:
      keywords:
        - earnings
        - market
        - stock
        - guidance
        - portfolio
        - trading
        - rates
        - fed
    options:
      maxItemsPerFeed: 15
      browser: true
  x-financial-list:
    displayName: X Financial List Example
    type: x
    disabled: true
    urls:
      - https://x.com/i/lists/2030824480940146987
    headers:
      userAgent: Mozilla/5.0
    filters:
      keywords:
        - market
        - fed
    options:
      browser: true
      maxItemsPerFeed: 20
